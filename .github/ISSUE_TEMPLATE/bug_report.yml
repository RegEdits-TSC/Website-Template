name: Bug report
description: Report a defect (non-security). For vulnerabilities use a private security advisory.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include secrets, tokens, or personal data in this report.
        For security vulnerabilities, file a private advisory instead of a public issue.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Tag, release, or commit SHA where you saw this.
    validations:
      required: false
