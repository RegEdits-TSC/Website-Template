name: Feature request
description: Propose a change or new capability.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Who is affected?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: security
    attributes:
      label: Security considerations
      description: New attack surface, data handled, auth/authz impact, new dependencies.
    validations:
      required: false
