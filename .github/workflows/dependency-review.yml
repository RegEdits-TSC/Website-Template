name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  review:
    name: Dependency Review
    # The dependency-review API needs GitHub Advanced Security on private repos.
    # Dormant while private+Free; activates when public or on Pro/GHAS.
    if: github.event.repository.visibility == 'public'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # post the summary comment
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          # Security-first: block any newly introduced vulnerable dependency.
          fail-on-severity: low
          # Permissive-only allow-list. Fails closed on any copyleft or
          # unrecognized license instead of enumerating every forbidden variant.
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, 0BSD, Unlicense, Zlib
          comment-summary-in-pr: on-failure
          warn-only: false
